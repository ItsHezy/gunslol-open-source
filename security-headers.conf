# Security headers for Nginx, Apache, and Cloudflare

# Nginx
# Include this block in your server configuration:

add_header Cross-Origin-Opener-Policy "same-origin" always;
add_header X-Frame-Options "DENY" always;
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://*.discordapp.com https://media.discordapp.net https://i.scdn.co; font-src 'self'; connect-src 'self' wss://api.lanyard.rest; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; upgrade-insecure-requests;" always;

# Apache
# Add these lines to your VirtualHost or .htaccess file:
#
# Header always set Cross-Origin-Opener-Policy "same-origin"
# Header always set X-Frame-Options "DENY"
# Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"
# Header always set Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://*.discordapp.com https://media.discordapp.net https://i.scdn.co; font-src 'self'; connect-src 'self' wss://api.lanyard.rest; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; upgrade-insecure-requests;"

# Cloudflare (HTTP Response Header rules)
# Use Cloudflare Rules to set these headers:
#
# Cross-Origin-Opener-Policy: same-origin
# X-Frame-Options: DENY
# Strict-Transport-Security: max-age=31536000; includeSubDomains; preload
# Content-Security-Policy: default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://*.discordapp.com https://media.discordapp.net https://i.scdn.co; font-src 'self'; connect-src 'self' wss://api.lanyard.rest; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; upgrade-insecure-requests;
